version: "3.9"

networks:
  banking-net:
    driver: bridge

volumes:
  account_db_data:
  transfer_db_data:
  notification_db_data:
  prometheus_data:
  grafana_data:

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: zookeeper
    networks: [banking-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka
    networks: [banking-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  account-db:
    image: postgres:16-alpine
    container_name: account-db
    networks: [banking-net]
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_pass
    volumes:
      - account_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_user -d account_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  transfer-db:
    image: postgres:16-alpine
    container_name: transfer-db
    networks: [banking-net]
    environment:
      POSTGRES_DB: transfer_db
      POSTGRES_USER: transfer_user
      POSTGRES_PASSWORD: transfer_pass
    volumes:
      - transfer_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transfer_user -d transfer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    networks: [banking-net]
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: redis
    networks: [banking-net]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    networks: [banking-net]
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    networks: [banking-net]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    networks: [banking-net]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    depends_on: [prometheus]

  # ─── Microservices ──────────────────────────────────────────────────────────

  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account-service
    networks: [banking-net]
    ports:
      - "8081:8081"
    environment:
      HTTP_PORT: "8081"
      DB_DSN: "postgres://account_user:account_pass@account-db:5432/account_db?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_CONSUMER_GROUP: "account-service-group"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      account-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  transfer-service:
    build:
      context: ./transfer-service
      dockerfile: Dockerfile
    container_name: transfer-service
    networks: [banking-net]
    ports:
      - "8082:8082"
    environment:
      HTTP_PORT: "8082"
      DB_DSN: "postgres://transfer_user:transfer_pass@transfer-db:5432/transfer_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_CONSUMER_GROUP: "transfer-service-group"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      transfer-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    networks: [banking-net]
    ports:
      - "8083:8083"
    environment:
      HTTP_PORT: "8083"
      DB_DSN: "postgres://notification_user:notification_pass@notification-db:5432/notification_db?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_CONSUMER_GROUP: "notification-service-group"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    networks: [banking-net]
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: "8080"
      ACCOUNT_SERVICE_URL: "http://account-service:8081"
      TRANSFER_SERVICE_URL: "http://transfer-service:8082"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8083"
      REDIS_ADDR: "redis:6379"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      - account-service
      - transfer-service
      - notification-service
      - redis
    restart: on-failure
